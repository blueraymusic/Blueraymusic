<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Blueray</title>
  <desc id="desc">A deep blue geometric banner reading Blueray, intelligence in motion.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="20" x2="1160" y2="340" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="0.48" stop-color="#0B1F4D"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <linearGradient id="ray" x1="280" y1="65" x2="940" y2="300" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#6366F1"/>
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientTransform="translate(842 174) rotate(180) scale(420 230)" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2563EB" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0H0V40" stroke="#93C5FD" stroke-opacity="0.07"/>
    </pattern>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="28" fill="url(#grid)"/>
  <rect width="1200" height="360" rx="28" fill="url(#glow)"/>

  <g opacity="0.9">
    <circle cx="1014" cy="84" r="144" stroke="#60A5FA" stroke-opacity="0.12"/>
    <circle cx="1014" cy="84" r="104" stroke="#60A5FA" stroke-opacity="0.16"/>
    <circle cx="1014" cy="84" r="64" stroke="#60A5FA" stroke-opacity="0.22"/>
    <circle cx="1014" cy="84" r="7" fill="#7DD3FC"/>
    <path d="M870 84H1158M1014-60V228" stroke="#60A5FA" stroke-opacity="0.11"/>
  </g>

  <path d="M-80 305L640 86" stroke="#2563EB" stroke-opacity="0.25" stroke-width="44" filter="url(#blur)"/>
  <path d="M-40 327L720 96" stroke="url(#ray)" stroke-opacity="0.42" stroke-width="2"/>
  <path d="M104 360L776 156" stroke="url(#ray)" stroke-opacity="0.2"/>

  <g transform="translate(86 74)">
    <rect x="0" y="0" width="48" height="7" rx="3.5" fill="#38BDF8"/>
    <rect x="56" y="0" width="7" height="7" rx="3.5" fill="#2563EB"/>
    <text x="0" y="100" fill="#EFF6FF" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="800" letter-spacing="-3">BLUE</text>
    <text x="222" y="100" fill="url(#ray)" font-family="Arial, Helvetica, sans-serif" font-size="82" font-weight="300" letter-spacing="-3">RAY</text>
    <text x="3" y="140" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="16" font-weight="600" letter-spacing="5">INTELLIGENCE IN MOTION</text>
  </g>

  <g transform="translate(88 280)" fill="#BFDBFE" font-family="monospace" font-size="13">
    <text x="0" y="0" opacity="0.6">TORONTO / CA</text>
    <text x="158" y="0" opacity="0.28">•</text>
    <text x="182" y="0" opacity="0.6">AI + COMPUTER VISION</text>
    <text x="376" y="0" opacity="0.28">•</text>
    <text x="400" y="0" opacity="0.6">BUILD / LEARN / REPEAT</text>
  </g>

  <g transform="translate(947 256)">
    <rect width="166" height="42" rx="21" fill="#020617" fill-opacity="0.58" stroke="#60A5FA" stroke-opacity="0.3"/>
    <circle cx="23" cy="21" r="5" fill="#38BDF8"/>
    <text x="39" y="26" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700" letter-spacing="1">Nd4</text>
  </g>

  <rect x="0.75" y="0.75" width="1198.5" height="358.5" rx="27.25" stroke="#60A5FA" stroke-opacity="0.2" stroke-width="1.5"/>
</svg>

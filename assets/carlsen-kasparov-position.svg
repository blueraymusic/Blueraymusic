<svg width="680" height="720" viewBox="0 0 680 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Carlsen versus Kasparov, 2004</title>
  <desc id="desc">The chess position after Garry Kasparov played bishop to b7 on move 29. Magnus Carlsen is White and is to move.</desc>
  <defs>
    <linearGradient id="frame" x1="40" y1="20" x2="640" y2="700" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617"/>
      <stop offset="1" stop-color="#172554"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.55"/>
    </filter>
  </defs>

  <rect width="680" height="720" rx="28" fill="url(#frame)"/>
  <circle cx="601" cy="68" r="4" fill="#38BDF8"/>
  <text x="56" y="60" fill="#EFF6FF" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" letter-spacing="2">CARLSEN — KASPAROV</text>
  <text x="56" y="86" fill="#93C5FD" font-family="Arial, Helvetica, sans-serif" font-size="12" letter-spacing="2">REYKJAVÍK RAPID / 2004 / 29…Bb7</text>

  <g filter="url(#shadow)">
    <rect x="84" y="112" width="512" height="512" rx="4" fill="#DBEAFE"/>

    <!-- dark squares -->
    <path d="M148 112H212V176H148V112ZM276 112H340V176H276V112ZM404 112H468V176H404V112ZM532 112H596V176H532V112Z
             M84 176H148V240H84V176ZM212 176H276V240H212V176ZM340 176H404V240H340V176ZM468 176H532V240H468V176Z
             M148 240H212V304H148V240ZM276 240H340V304H276V240ZM404 240H468V304H404V240ZM532 240H596V304H532V240Z
             M84 304H148V368H84V304ZM212 304H276V368H212V304ZM340 304H404V368H340V304ZM468 304H532V368H468V304Z
             M148 368H212V432H148V368ZM276 368H340V432H276V368ZM404 368H468V432H404V368ZM532 368H596V432H532V368Z
             M84 432H148V496H84V432ZM212 432H276V496H212V432ZM340 432H404V496H340V432ZM468 432H532V496H468V432Z
             M148 496H212V560H148V496ZM276 496H340V560H276V496ZM404 496H468V560H404V496ZM532 496H596V560H532V496Z
             M84 560H148V624H84V560ZM212 560H276V624H212V560ZM340 560H404V624H340V560ZM468 560H532V624H468V560Z" fill="#24527A"/>

    <!-- critical-square accents: b7, c6, c5 -->
    <rect x="148" y="176" width="64" height="64" fill="#2563EB" fill-opacity="0.26"/>
    <rect x="212" y="240" width="64" height="64" fill="#38BDF8" fill-opacity="0.3"/>
    <rect x="212" y="304" width="64" height="64" fill="#38BDF8" fill-opacity="0.22"/>

    <!-- black: Kg8 Qe6 Ra8 Re8 Bb7 Nf5; pawns a5 f7 g7 h6 -->
    <g fill="#07111F" stroke="#BFDBFE" stroke-opacity="0.32" stroke-width="0.7" font-family="DejaVu Sans, Segoe UI Symbol, Arial Unicode MS" font-size="49" text-anchor="middle">
      <text x="564" y="164">♚</text>
      <text x="372" y="292">♛</text>
      <text x="116" y="164">♜</text>
      <text x="372" y="164">♜</text>
      <text x="180" y="228">♝</text>
      <text x="436" y="356">♞</text>
      <text x="116" y="356">♟</text>
      <text x="436" y="228">♟</text>
      <text x="500" y="228">♟</text>
      <text x="564" y="292">♟</text>
    </g>

    <!-- white: Kh2 Qc5 Rd1 Re1 Be5 Nc6; pawns a4 b2 f2 g2 h3 -->
    <g fill="#F8FAFC" stroke="#0F172A" stroke-opacity="0.75" stroke-width="0.9" font-family="DejaVu Sans, Segoe UI Symbol, Arial Unicode MS" font-size="49" text-anchor="middle">
      <text x="564" y="548">♔</text>
      <text x="244" y="356">♕</text>
      <text x="308" y="612">♖</text>
      <text x="372" y="612">♖</text>
      <text x="372" y="356">♗</text>
      <text x="244" y="292">♘</text>
      <text x="116" y="420">♙</text>
      <text x="180" y="548">♙</text>
      <text x="436" y="548">♙</text>
      <text x="500" y="548">♙</text>
      <text x="564" y="484">♙</text>
    </g>
  </g>

  <!-- board coordinates -->
  <g fill="#93C5FD" font-family="monospace" font-size="12" text-anchor="middle">
    <text x="116" y="644">a</text><text x="180" y="644">b</text><text x="244" y="644">c</text><text x="308" y="644">d</text>
    <text x="372" y="644">e</text><text x="436" y="644">f</text><text x="500" y="644">g</text><text x="564" y="644">h</text>
  </g>
  <g fill="#93C5FD" font-family="monospace" font-size="12" text-anchor="middle">
    <text x="68" y="151">8</text><text x="68" y="215">7</text><text x="68" y="279">6</text><text x="68" y="343">5</text>
    <text x="68" y="407">4</text><text x="68" y="471">3</text><text x="68" y="535">2</text><text x="68" y="599">1</text>
  </g>

  <g transform="translate(84 670)">
    <circle cx="7" cy="7" r="7" fill="#38BDF8"/>
    <text x="25" y="12" fill="#DBEAFE" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" letter-spacing="2">WHITE TO MOVE</text>
    <text x="512" y="12" fill="#64748B" font-family="monospace" font-size="12" text-anchor="end">30.Nd4</text>
  </g>

  <rect x="0.75" y="0.75" width="678.5" height="718.5" rx="27.25" stroke="#60A5FA" stroke-opacity="0.2" stroke-width="1.5"/>
</svg>
